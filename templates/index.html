<!DOCTYPE html>
<html>
<head>
    <title>Hair Disease AI</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 480px;
            margin: 40px auto;
            background: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #1565c0;
        }

        input, select {
            margin: 8px 0;
            padding: 6px;
        }

        button {
            background: #1565c0;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #0d47a1;
        }

        img {
            width: 220px;
            margin-top: 10px;
            border-radius: 12px;
        }

        .card {
            margin-top: 20px;
            padding: 18px;
            border-radius: 12px;
            background: #f5f7fa;
            border-left: 6px solid #1565c0;
        }

        .label {
            font-weight: bold;
        }

        .bar {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        .bar-fill {
            height: 12px;
            width: 0%;
            background: #2e7d32;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🧠 Medical AI Diagnosis</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="text" name="patient_name" placeholder="Enter Name" required><br>
    <input type="number" name="age" placeholder="Enter Age" required><br>

    <select name="language">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="kn">Kannada</option>
    </select><br>

    <input type="file" name="image" required><br>
    <button type="submit">Analyze</button>
</form>

<img id="preview" style="display:none;">

<div class="card">

<div><b>{{ text.name }}:</b> {{ patient_name }}</div>
<div><b>{{ text.age }}:</b> {{ age }}</div>

<h3>{{ result }}</h3>
<p>Confidence: {{ confidence }}</p>

<div class="bar">
    <div class="bar-fill" id="bar"></div>
</div>

<div>
    <b>{{ text.natural }}</b><br>
    {{ natural }}
</div>

<div>
    <b>{{ text.medical }}</b><br>
    {{ medical }}
</div>

<button onclick="downloadReport()">Download Report</button>

</div>

<hr>
<h3>History</h3>
<ul id="history"></ul>

</div>

<script>
document.querySelector("input[type=file]").onchange = e => {
    const file = e.target.files[0];
    if (file) {
        const img = document.getElementById("preview");
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
    }
};

// bar
let confidence = "{{ confidence }}";
confidence = parseFloat(confidence.replace('%',''));
document.getElementById("bar").style.width = confidence + "%";

// history
function saveHistory() {
    let data = JSON.parse(localStorage.getItem("history")) || [];
    data.push({
        name: "{{ patient_name }}",
        age: "{{ age }}",
        result: "{{ result }}",
        confidence: "{{ confidence }}"
    });
    localStorage.setItem("history", JSON.stringify(data));
    loadHistory();
}

function loadHistory() {
    let data = JSON.parse(localStorage.getItem("history")) || [];
    let list = document.getElementById("history");
    list.innerHTML = "";
    data.slice(-5).reverse().forEach(item => {
        let li = document.createElement("li");
        li.innerHTML = `${item.name} (${item.age}) - ${item.result} - ${item.confidence}`;
        list.appendChild(li);
    });
}

function downloadReport() {
    let content = `
{{ text.report }}

{{ text.name }}: {{ patient_name }}
{{ text.age }}: {{ age }}

Disease: {{ result }}
Confidence: {{ confidence }}

{{ text.natural }}: {{ natural }}
{{ text.medical }}: {{ medical }}
`;
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "report.txt";
    a.click();
}

loadHistory();
if ("{{ result }}" !== "") {
    saveHistory();
}
</script>

</body>
</html>
